<!DOCTYPE html>
<html>
<head>
    <title>My Music Player</title>
</head>

<body style="background:black; color:white; text-align:center;">

    <h1>🎵 My Favorite Song</h1>

    <audio id="song" controls>
        <source src="https://raw.githubusercontent.com/earningtechgamer-gif/BABU-/main/Ishq%20Ki%20Saazishein%20Ishq%20Ki%20Baaziyaa%20Ringtone%20Download%20-%20MobCup.Com.Co.mp3" type="audio/mp3">
    </audio>

    <br><br>

    <button onclick="playSong()">▶ Play</button>
    <button onclick="pauseSong()">⏸ Pause</button>

    <script>
        let song = document.getElementById("song");

        function playSong() {
            song.play();
        }

        function pauseSong() {
            song.pause();
        }
    </script>

</body>
</html>
