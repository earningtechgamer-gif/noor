<!DOCTYPE html>
<html>
<head>
<style>
.slideshow {
  position: relative;
  width: 90%;
  height: 300px;
  margin: auto;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: 1s;
}

.active {
  opacity: 1;
}
</style>
</head>

<body>

<div class="slideshow">
  <img src="https://picsum.photos/id/1015/600/300" class="slide active">
  <img src="https://picsum.photos/id/1016/600/300" class="slide">
  <img src="https://picsum.photos/id/1018/600/300" class="slide">
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  let slides = document.querySelectorAll(".slide");
  let index = 0;

  setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
  }, 2000);
});
</script>

</body>
</html>
