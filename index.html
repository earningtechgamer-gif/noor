<!DOCTYPE html>
<html>
<head>
  <title>Noor Slideshow</title>

  <style>
    body {
      margin: 0;
      text-align: center;
      background: black;
      color: white;
    }

    .slideshow {
      position: relative;
      width: 90%;
      height: 300px;
      margin: auto;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: 1s;
    }

    .active {
      opacity: 1;
    }
  </style>
</head>

<body>

<h2>Slideshow</h2>

<div class="slideshow">
  <img src="https://raw.githubusercontent.com/earningtechgamer-gif/birthday-gift/726a4ba828df63d0c41d57bcede8bcfd936d48e5/IMG_20260202_045607.jpg" class="slide active">
  <img src="https://raw.githubusercontent.com/earningtechgamer-gif/birthday-gift/726a4ba828df63d0c41d57bcede8bcfd936d48e5/IMG_20260202_045607.jpg" class="slide">
</div>

<script>
window.onload = function() {
  let slides = document.querySelectorAll(".slide");
  let index = 0;

  setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
  }, 3000);
}
</script>

</body>
</html>
